workflows:
  ios-release:
    name: iOS App Store Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: FitTrax+
    
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.fittraxplus.app
      vars:
        BUNDLE_ID: "com.fittraxplus.app"
      node: 20
      xcode: latest
      cocoapods: default
    
    scripts:
      - name: Clean previous builds
        script: |
          cd frontend
          rm -rf node_modules
          rm -rf ios
          rm -rf .expo
          rm -f package-lock.json
          rm -f yarn.lock
          
      - name: Install dependencies
        script: |
          cd frontend
          yarn install
          
      - name: Clear Metro cache
        script: |
          cd frontend
          npx expo start --clear --non-interactive &
          sleep 5
          kill $! 2>/dev/null || true
          rm -rf $TMPDIR/metro-* 2>/dev/null || true
          rm -rf $TMPDIR/haste-map-* 2>/dev/null || true
          
      - name: Install Expo CLI
        script: |
          npm install -g eas-cli
          
      - name: Prebuild iOS
        script: |
          cd frontend
          npx expo prebuild --platform ios --clean
          
      - name: Install CocoaPods
        script: |
          cd frontend/ios
          pod install --repo-update
          
      - name: Set up code signing
        script: |
          xcode-project use-profiles
          
      - name: Find workspace and build
        script: |
          cd frontend/ios
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          SCHEME=$(echo "$WORKSPACE" | sed 's/.xcworkspace//')
          echo "Found workspace: $WORKSPACE"
          echo "Using scheme: $SCHEME"
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME"
            
    artifacts:
      - frontend/ios/build/ios/ipa/*.ipa
      - frontend/ios/**/*.ipa
      
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
